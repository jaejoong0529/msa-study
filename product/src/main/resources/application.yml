spring:
  application:
    name: product-service

# Swagger Try it out / OpenAPI servers 기준 URL (게이트웨이)
api:
  gateway:
    base-url: http://localhost:19091

server:
  port: 19093
eureka:
  client:
    service-url:
      defaultZone: http://localhost:19090/eureka/

management:
  zipkin:
    tracing:
      endpoint: "http://localhost:9411/api/v2/spans"
  tracing:
    sampling:
      probability: 1.0