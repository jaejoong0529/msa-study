server:
  port: 19091  # 게이트웨이 서비스가 실행될 포트 번호

spring:
  main:
    web-application-type: reactive  # Spring 애플리케이션이 리액티브 웹 애플리케이션으로 설정됨
  application:
    name: gateway-service  # 애플리케이션 이름을 'gateway-service'로 설정
  cloud:
    gateway:
      routes:  # Spring Cloud Gateway의 라우팅 설정
        - id: order-service  # 라우트 식별자
          uri: lb://order-service  # 'order-service'라는 이름으로 로드 밸런싱된 서비스로 라우팅
          predicates:
            - Path=/orders/**  # /order/** 경로로 들어오는 요청을 이 라우트로 처리
        - id: product-service  # 라우트 식별자
          uri: lb://product-service  # 'product-service'라는 이름으로 로드 밸런싱된 서비스로 라우팅
          predicates:
            - Path=/products/**  # /product/** 경로로 들어오는 요청을 이 라우트로 처리
        - id: auth-service  # 라우트 식별자
          uri: lb://auth-service  # 'auth-service'라는 이름으로 로드 밸런싱된 서비스로 라우팅
          predicates:
            - Path=/auth/**  # /auth/signIn 경로로 들어오는 요청을 이 라우트로 처리
        - id: openapi-product
          uri: lb://product-service
          predicates:
            - Path=/openapi/product/**
          filters:
            - StripPrefix=2
        - id: openapi-order
          uri: lb://order-service
          predicates:
            - Path=/openapi/order/**
          filters:
            - StripPrefix=2
        - id: openapi-auth
          uri: lb://auth-service
          predicates:
            - Path=/openapi/auth/**
          filters:
            - StripPrefix=2
      discovery:
        locator:
          enabled: true  # 서비스 디스커버리를 통해 동적으로 라우트를 생성하도록 설정

service:
  jwt:
    secret-key: "401b09eab3c013d4ca54922bb802bec8fd5318192b0a75f201d8b3727429080fb337591abd3e44453b954555b7a0812e1081c39b740293f765eae731f5a65ed1"


eureka:
  client:
    service-url:
      defaultZone: http://localhost:19090/eureka/  # Eureka 서버의 URL을 지정

# 통합 Swagger: 각 서비스 OpenAPI 의 servers 는 api.gateway.base-url(기본 http://localhost:19091)로 맞춰 Try it out 이 게이트웨이로 나가도록 함
springdoc:
  # false면 SpringDocConfiguration 자체가 비활성화되어 Swagger UI도 같이 안 뜰 수 있음
  api-docs:
    enabled: true
  # 게이트웨이 앱에 비어 있는 /v3/api-docs(OpenAPI) 리소스는 끄고, UI·swagger-config만 사용
  enable-default-api-docs: false
  swagger-ui:
    disable-swagger-default-url: true
    urls:
      - name: Product
        url: /openapi/product/v3/api-docs
      - name: Order
        url: /openapi/order/v3/api-docs
      - name: Auth
        url: /openapi/auth/v3/api-docs
